<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiTugas - Daftar Tugas Harian</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css.style.css">
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">☑️ SiTugas</a>
            <span class="badge bg-warning text-dark ms-2" id="badgeNavbar">0</span>
            <button class="btn btn-light btn-sm ms-auto" data-bs-toggle="offcanvas" data-bs-target="#offcanvasTambah" id="tombolBukaForm">
                + Tugas Baru
            </button>
        </div>
    </nav>

    <div class="container mt-4">

        
        <div id="areaPeringatan" class="mb-3"></div>

        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card text-center border-0 shadow-sm h-100">
                    <div class="card-body py-3">
                        <p class="text-muted small mb-1">Total Tugas</p>
                        <h3 class="fw-bold mb-0" id="statTotal">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center border-0 shadow-sm h-100">
                    <div class="card-body py-3">
                        <p class="text-muted small mb-1">Belum Selesai</p>
                        <h3 class="fw-bold text-danger mb-0" id="statBelum">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center border-0 shadow-sm h-100">
                    <div class="card-body py-3">
                        <p class="text-muted small mb-1">Selesai</p>
                        <h3 class="fw-bold text-success mb-0" id="statSelesai">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center border-0 shadow-sm h-100">
                    <div class="card-body py-3">
                        <p class="text-muted small mb-1">Progres</p>
                        <h3 class="fw-bold text-primary mb-0" id="statPersen">0%</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between mb-1">
                <small class="text-muted">Progres penyelesaian tugas</small>
                <small class="text-muted" id="labelProgres">0 dari 0 selesai</small>
            </div>
            <div class="progress" style="height: 12px;">
                <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" id="barProgres" role="progressbar" style="width: 0%;"></div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body py-2">
                <div class="row g-2 align-items-center">
                    <div class="col-auto">
                        <small class="text-muted me-1">Tampilkan:</small>
                    </div>
                    <div class="col-auto">
                        <div class="btn-group btn-group-sm" id="grupFilterStatus">
                            <button class="btn btn-primary active" data-filter="semua">Semua</button>
                            <button class="btn btn-outline-primary" data-filter="belum">Belum Selesai</button>
                            <button class="btn btn-outline-primary" data-filter="selesai">Selesai</button>
                        </div>
                    </div>
                    <div class="col-auto">
                        <select class="form-select form-select-sm" id="filterPrioritas">
                            <option value="semua">Semua Prioritas</option>
                            <option value="tinggi">Prioritas Tinggi</option>
                            <option value="sedang">Prioritas Sedang</option>
                            <option value="rendah">Prioritas Rendah</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <small class="text-muted me-1">Urutkan:</small>
                        <select class="form-select form-select-sm d-inline w-auto" id="pilihanUrut">
                            <option value="terbaru">Terbaru</option>
                            <option value="terlama">Terlama</option>
                            <option value="az">A - Z</option>
                            <option value="prioritas">Prioritas Tertinggi</option>
                        </select>
                    </div>
                    <div class="col-auto ms-auto">
                        <button class="btn btn-sm btn-outline-danger d-none" id="tombolBersihkanSelesai">🗑️ Bersihkan Selesai</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="areaDaftarTugas">
            <div id="pesanKosong" class="text-center py-5">
                <p class="fs-1">📋</p>
                <p class="text-muted">Belum ada tugas. Klik <strong>+ Tugas Baru</strong> untuk mulai.</p>
            </div>
            <div id="kontainerKartuTugas" class="row g-3"></div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasTambah">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="judulForm">Tambah Tugas Baru</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <form id="formTugas" class="needs-validation" novalidate>
                <input type="hidden" id="inputIndeksEdit" value="-1">

                <div class="mb-3">
                    <label for="inputNama" class="form-label">Nama Tugas <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputNama" required>
                    <div class="invalid-feedback">Nama tugas tidak boleh kosong.</div>
                </div>

                <div class="mb-3">
                    <label for="inputKategori" class="form-label">Kategori</label>
                    <select class="form-select" id="inputKategori">
                        <option value="Kuliah">🎓 Kuliah</option>
                        <option value="Pribadi">👤 Pribadi</option>
                        <option value="Belanja">🛒 Belanja</option>
                        <option value="Kesehatan">❤️ Kesehatan</option>
                        <option value="Lainnya">✨ Lainnya</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Prioritas</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="prioritas" id="prioRendah" value="rendah" checked>
                            <label class="form-check-label" for="prioRendah">🟢 Rendah</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="prioritas" id="prioSedang" value="sedang">
                            <label class="form-check-label" for="prioSedang">🟡 Sedang</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="prioritas" id="prioTinggi" value="tinggi">
                            <label class="form-check-label" for="prioTinggi">🔴 Tinggi</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="inputTenggat" class="form-label">Tanggal Tenggat</label>
                    <input type="date" class="form-control" id="inputTenggat">
                </div>

                <div class="mb-4">
                    <label for="inputCatatan" class="form-label">Catatan Tambahan</label>
                    <textarea class="form-control" id="inputCatatan" rows="3"></textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">💾 Simpan Tugas</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastNotif" class="toast" role="alert">
            <div class="toast-body" id="isiNotif"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
